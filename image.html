<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Scraper & Downloader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

  header { background: #1e293b; color: #fff; padding: 16px 28px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .step { background: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
  .step-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: #4f46e5; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:640px) { .grid2 { grid-template-columns: 1fr; } }

  textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; line-height: 1.7; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 10px 12px; resize: vertical; background: #f8fafc; color: #1e293b; outline: none; }
  textarea:focus { border-color: #4f46e5; background: #fff; }
  .field-label { font-size: 12px; color: #475569; font-weight: 600; margin-bottom: 6px; display: block; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4338ca; }
  .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-green:hover:not(:disabled) { background: #15803d; }
  .btn-green:disabled { background: #86efac; cursor: not-allowed; }
  .btn-gray { background: #e2e8f0; color: #475569; }
  .btn-gray:hover { background: #cbd5e1; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  #status-text { font-size: 13px; color: #64748b; margin-left: 4px; }

  .progress-bar-wrap { background: #e2e8f0; border-radius: 99px; height: 5px; margin-top: 12px; display: none; }
  #prog-bar { height: 5px; border-radius: 99px; background: #4f46e5; width: 0; transition: width 0.3s; }

  #log { font-family: monospace; font-size: 11.5px; background: #0f172a; color: #94a3b8; border-radius: 8px; padding: 12px 14px; max-height: 160px; overflow-y: auto; margin-top: 14px; display: none; line-height: 1.8; }
  .log-ok { color: #4ade80; }
  .log-err { color: #f87171; }
  .log-info { color: #60a5fa; }

  #results-section { display: none; }
  #summary { font-size: 12px; color: #64748b; font-weight: 500; }

  #img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 14px; }

  .img-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .img-card .preview { height: 130px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .img-card .preview img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .img-card .preview .no-img { font-size: 10px; color: #94a3b8; text-align: center; padding: 10px; }
  .img-card .info { padding: 8px 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .img-card .card-name { font-size: 11px; font-weight: 600; color: #1e293b; line-height: 1.4; word-break: break-word; }
  .img-card .card-status { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; display: inline-block; width: fit-content; }
  .status-ok { background: #dcfce7; color: #16a34a; }
  .status-err { background: #fee2e2; color: #dc2626; }
  .status-pending { background: #fef9c3; color: #854d0e; }
  .img-card.err-card { border-color: #fca5a5; }
  .img-card.err-card .preview { background: #fff5f5; }

  .spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #zip-section { display: none; margin-top: 16px; padding-top: 14px; border-top: 1px solid #e2e8f0; }
  #zip-status { font-size: 13px; color: #64748b; margin-left: 6px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>&#128247; Image Scraper &amp; Downloader</h1>
    <p>Fetch URLs &rarr; Extract images &rarr; Preview &rarr; Download as ZIP with your names</p>
  </div>
</header>

<div class="wrap">

  <!-- STEP 1 -->
  <div class="step">
    <div class="step-title"><span class="step-num">1</span> Paste URLs and Names</div>
    <div class="grid2">
      <div>
        <span class="field-label">URLs — one per line</span>
        <textarea id="urls-input" placeholder="https://www.e-arc.co.uk/service/design-print-services/&#10;https://www.e-arc.co.uk/service/digital-printing-services/&#10;..."></textarea>
      </div>
      <div>
        <span class="field-label">Names — one per line (same order)</span>
        <textarea id="names-input" placeholder="Design &amp; Print Services Dartford&#10;Digital Printing Services Dartford&#10;..."></textarea>
      </div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step">
    <div class="step-title"><span class="step-num">2</span> Fetch &amp; Extract Images</div>
    <div class="controls">
      <button class="btn btn-primary" id="start-btn" onclick="startProcess()">&#128269; Fetch Images</button>
      <button class="btn btn-gray" onclick="clearAll()">&#10005; Clear All</button>
      <span id="status-text"></span>
    </div>
    <div class="progress-bar-wrap" id="prog-wrap"><div id="prog-bar"></div></div>
    <div id="log"></div>
  </div>

  <!-- STEP 3 Results + STEP 4 ZIP -->
  <div class="step" id="results-section">
    <div class="step-title" style="justify-content:space-between;">
      <span style="display:flex;align-items:center;gap:8px;"><span class="step-num">3</span> Preview Images</span>
      <span id="summary"></span>
    </div>
    <div id="img-grid"></div>

    <div id="zip-section">
      <div class="step-title" style="margin-bottom:10px;margin-top:16px;padding-top:14px;border-top:1px solid #e2e8f0;">
        <span class="step-num">4</span> Download as ZIP
      </div>
      <div class="controls">
        <button class="btn btn-green" id="zip-btn" onclick="buildZip()">&#11015; Download ZIP</button>
        <span id="zip-status"></span>
      </div>
    </div>
  </div>

</div>

<script>
// CORS Proxies - tried in order
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u)
];

let imageData = [];

function addLog(msg, type) {
  const box = document.getElementById('log');
  box.style.display = 'block';
  const d = document.createElement('div');
  d.className = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
  d.textContent = msg;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }

function setProgress(pct) {
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('prog-bar').style.width = pct + '%';
}

function clearAll() {
  ['urls-input','names-input'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('log').innerHTML = '';
  document.getElementById('log').style.display = 'none';
  document.getElementById('img-grid').innerHTML = '';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('zip-section').style.display = 'none';
  document.getElementById('prog-wrap').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0';
  document.getElementById('zip-status').textContent = '';
  setStatus('');
  imageData = [];
}

function sanitize(name) {
  return name.replace(/[\\/:*?"<>|]/g, '').trim().replace(/\s+/g, '_') || 'image';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Try each proxy until one works
async function fetchHTML(url) {
  let lastErr = '';
  for (const makeUrl of PROXIES) {
    try {
      const r = await fetch(makeUrl(url), { signal: AbortSignal.timeout(13000) });
      if (r.ok) {
        const text = await r.text();
        if (text && text.length > 200) return text;
      }
    } catch(e) { lastErr = e.message; }
  }
  throw new Error('Could not fetch page (' + lastErr + ')');
}

// Pull the best image URL out of HTML
function extractImageUrl(html, pageUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Priority 1: og:image meta tag
  const og = doc.querySelector('meta[property="og:image"], meta[name="og:image"]');
  if (og) {
    const c = (og.getAttribute('content') || '').trim();
    if (c) {
      if (c.startsWith('http')) return c;
      if (c.startsWith('//')) return 'https:' + c;
      try { return new URL(c, pageUrl).href; } catch(e) {}
    }
  }

  // Priority 2: twitter:image
  const tw = doc.querySelector('meta[name="twitter:image"], meta[property="twitter:image"]');
  if (tw) {
    const c = (tw.getAttribute('content') || '').trim();
    if (c && c.startsWith('http')) return c;
  }

  // Priority 3: Largest img tag found in body
  const skipWords = ['logo','icon','favicon','pixel','spacer','blank','placeholder','loading','sprite','1x1','badge','arrow','bullet','social','share','close','menu','search','cart','avatar','flag','rating','tick','dot'];

  function toAbsUrl(src) {
    if (!src || src.startsWith('data:')) return null;
    try {
      if (src.startsWith('//')) return 'https:' + src;
      if (src.startsWith('http')) return src;
      return new URL(src, pageUrl).href;
    } catch(e) { return null; }
  }

  const imgs = Array.from(doc.querySelectorAll('img'));
  let best = null, bestScore = -1;

  for (const img of imgs) {
    const src = img.getAttribute('src') || img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('data-original') || '';
    if (!src) continue;
    const lower = src.toLowerCase();
    if (skipWords.some(w => lower.includes(w))) continue;

    const abs = toAbsUrl(src);
    if (!abs) continue;

    const w = parseInt(img.getAttribute('width') || 0);
    const h = parseInt(img.getAttribute('height') || 0);
    const score = w * h > 0 ? w * h : abs.length;

    if (score > bestScore) { bestScore = score; best = abs; }
  }

  return best;
}

// Fetch the actual image as a blob
async function fetchBlob(imgUrl) {
  // Direct fetch first
  try {
    const r = await fetch(imgUrl, { signal: AbortSignal.timeout(12000) });
    if (r.ok) {
      const b = await r.blob();
      if (b.size > 200) return b;
    }
  } catch(e) {}

  // Try proxies
  for (const makeUrl of PROXIES) {
    try {
      const r = await fetch(makeUrl(imgUrl), { signal: AbortSignal.timeout(12000) });
      if (r.ok) {
        const b = await r.blob();
        if (b.size > 200) return b;
      }
    } catch(e) {}
  }
  throw new Error('Image download failed');
}

function blobExt(blob, url) {
  const map = {'image/jpeg':'jpg','image/jpg':'jpg','image/png':'png','image/webp':'webp','image/gif':'gif','image/avif':'avif','image/svg+xml':'svg'};
  const t = blob.type.split(';')[0];
  if (map[t]) return map[t];
  const m = url.split('?')[0].match(/\.(jpe?g|png|webp|gif|avif|svg)$/i);
  return m ? m[1].toLowerCase().replace('jpeg','jpg') : 'jpg';
}

// Pre-create card with spinner
function createCard(i, name) {
  const grid = document.getElementById('img-grid');
  const card = document.createElement('div');
  card.className = 'img-card';
  card.id = 'card-' + i;
  card.innerHTML =
    '<div class="preview" id="prev-' + i + '"><div class="spinner"></div></div>' +
    '<div class="info">' +
      '<div class="card-name">' + esc(name) + '</div>' +
      '<span class="card-status status-pending" id="cst-' + i + '">Fetching...</span>' +
    '</div>';
  grid.appendChild(card);
}

function updateCard(i, blob, imgUrl, err) {
  const prev = document.getElementById('prev-' + i);
  const cst  = document.getElementById('cst-' + i);
  const card = document.getElementById('card-' + i);

  if (err) {
    card.classList.add('err-card');
    prev.innerHTML = '<div class="no-img">&#10060; ' + esc(err) + '</div>';
    cst.className = 'card-status status-err';
    cst.textContent = 'Failed';
  } else {
    const objUrl = URL.createObjectURL(blob);
    prev.innerHTML = '<img src="' + objUrl + '" alt="" />';
    cst.className = 'card-status status-ok';
    cst.textContent = 'Ready';
  }
}

async function startProcess() {
  const urlsRaw  = document.getElementById('urls-input').value.trim();
  const namesRaw = document.getElementById('names-input').value.trim();

  if (!urlsRaw || !namesRaw) { alert('Please paste both URLs and Names.'); return; }

  const urls  = urlsRaw.split('\n').map(x => x.trim()).filter(Boolean);
  const names = namesRaw.split('\n').map(x => x.trim()).filter(Boolean);

  if (urls.length !== names.length) {
    alert('Count mismatch!\nURLs: ' + urls.length + '\nNames: ' + names.length + '\n\nEach URL must have a matching name on the same line number.');
    return;
  }

  // Reset UI
  document.getElementById('log').innerHTML = '';
  document.getElementById('log').style.display = 'none';
  document.getElementById('img-grid').innerHTML = '';
  document.getElementById('prog-bar').style.width = '0';
  document.getElementById('zip-status').textContent = '';
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('zip-section').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
  imageData = [];

  // Draw all cards with spinners first
  for (let i = 0; i < urls.length; i++) createCard(i, names[i]);

  let ok = 0;

  for (let i = 0; i < urls.length; i++) {
    const url  = urls[i];
    const name = names[i];
    setStatus((i + 1) + ' / ' + urls.length + ' — ' + name);
    setProgress(Math.round((i / urls.length) * 100));

    addLog('[' + (i+1) + '/' + urls.length + '] ' + name, 'info');
    addLog('  Fetching page: ' + url, 'info');

    try {
      const html = await fetchHTML(url);
      addLog('  Page fetched (' + (html.length / 1024).toFixed(1) + ' KB)', 'ok');

      const imgUrl = extractImageUrl(html, url);
      if (!imgUrl) throw new Error('No image found in page HTML');

      addLog('  Image URL: ' + imgUrl.slice(0, 90) + (imgUrl.length > 90 ? '...' : ''), 'ok');

      const blob = await fetchBlob(imgUrl);
      const ext  = blobExt(blob, imgUrl);

      addLog('  Downloaded image (' + (blob.size / 1024).toFixed(1) + ' KB)', 'ok');

      imageData.push({ name, imgUrl, blob, ext, error: null });
      updateCard(i, blob, imgUrl, null);
      ok++;

    } catch(e) {
      addLog('  ERROR: ' + e.message, 'err');
      imageData.push({ name, imgUrl: null, blob: null, ext: null, error: e.message });
      updateCard(i, null, null, e.message);
    }

    await new Promise(r => setTimeout(r, 400));
  }

  setProgress(100);
  setStatus('Done — ' + ok + ' of ' + urls.length + ' images ready');
  document.getElementById('summary').textContent = ok + ' / ' + urls.length + ' images ready';
  document.getElementById('start-btn').disabled = false;
  if (ok > 0) document.getElementById('zip-section').style.display = 'block';
}

async function buildZip() {
  const btn = document.getElementById('zip-btn');
  const zst = document.getElementById('zip-status');
  btn.disabled = true;
  btn.textContent = 'Building...';
  zst.textContent = '';

  try {
    const zip    = new JSZip();
    const folder = zip.folder('images');
    let added = 0;

    for (const item of imageData) {
      if (!item.blob) continue;
      const fname = sanitize(item.name) + '.' + item.ext;
      folder.file(fname, item.blob);
      added++;
    }

    if (added === 0) { zst.textContent = 'No images to zip.'; btn.disabled = false; btn.textContent = '⬇ Download ZIP'; return; }

    zst.textContent = 'Compressing ' + added + ' images...';
    const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 3 } });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'scraped_images.zip';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);

    zst.textContent = '✓ ZIP with ' + added + ' images downloaded!';
  } catch(e) {
    zst.textContent = 'ZIP error: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '⬇ Download ZIP';
}
</script>
</body>
</html>
