<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Scraper Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #222; min-height: 100vh; }

  header { background: #1a1a2e; color: #fff; padding: 18px 30px; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; color: #aaa; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width:600px){ .input-grid { grid-template-columns: 1fr; } }

  .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
  textarea { width: 100%; height: 220px; font-family: monospace; font-size: 12.5px; line-height: 1.6; border: 1.5px solid #ddd; border-radius: 7px; padding: 10px; resize: vertical; background: #fafafa; color: #222; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: #4f46e5; background: #fff; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  button { padding: 9px 20px; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  #start-btn { background: #4f46e5; color: #fff; }
  #start-btn:hover { background: #4338ca; }
  #start-btn:disabled { background: #a5a3e0; cursor: not-allowed; }
  #dl-all-btn { background: #16a34a; color: #fff; display: none; }
  #dl-all-btn:hover { background: #15803d; }
  #clear-btn { background: #f3f4f6; color: #555; border: 1px solid #ddd; }
  #clear-btn:hover { background: #e5e7eb; }

  #status { font-size: 13px; color: #555; }

  .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 6px; margin-bottom: 16px; display: none; }
  #progress-bar { height: 6px; border-radius: 999px; background: #4f46e5; width: 0%; transition: width 0.3s; }

  #log-box { background: #1e1e2e; color: #a6e3a1; font-family: monospace; font-size: 12px; border-radius: 8px; padding: 12px 14px; max-height: 160px; overflow-y: auto; margin-bottom: 16px; display: none; line-height: 1.7; }

  #results-header { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; display: none; }
  #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }

  .img-card { background: #fff; border-radius: 10px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; border: 1.5px solid #eee; }
  .img-card img { width: 100%; height: 110px; object-fit: contain; border-radius: 6px; margin-bottom: 8px; background: #f9f9f9; }
  .img-card .img-name { font-size: 11px; color: #444; line-height: 1.4; margin-bottom: 8px; word-break: break-word; }
  .img-card .dl-btn { display: inline-block; padding: 5px 12px; background: #4f46e5; color: #fff; border-radius: 5px; font-size: 11px; text-decoration: none; cursor: pointer; border: none; font-weight: 500; }
  .img-card .dl-btn:hover { background: #4338ca; }
  .img-card.error { border-color: #fca5a5; background: #fff5f5; }
  .img-card.error .img-name { color: #dc2626; }
  .img-card .err-msg { font-size: 10.5px; color: #dc2626; }
  .img-card .src-link { display: block; font-size: 10px; color: #888; margin-top: 4px; word-break: break-all; }

  .badge { display: inline-block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 999px; font-size: 11px; padding: 2px 10px; font-weight: 600; }
  .badge.bad { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
  <div>
    <h1>Image Scraper Tool</h1>
    <span>Extracts the largest body image from each URL and downloads with your given name</span>
  </div>
</header>

<div class="container">

  <div class="input-grid">
    <div class="card">
      <label>URLs — one per line</label>
      <textarea id="urls-input" placeholder="https://www.e-arc.co.uk/service/design-print-services/
https://www.e-arc.co.uk/service/digital-printing-services/
..."></textarea>
    </div>
    <div class="card">
      <label>Names — one per line (same order)</label>
      <textarea id="names-input" placeholder="Design & Print Services Dartford
Digital Printing Services Dartford
..."></textarea>
    </div>
  </div>

  <div class="controls">
    <button id="start-btn" onclick="startProcess()">⬇ Extract & Download Images</button>
    <button id="dl-all-btn" onclick="downloadAll()">⬇ Download All Found</button>
    <button id="clear-btn" onclick="clearAll()">✕ Clear</button>
    <span id="status"></span>
  </div>

  <div class="progress-wrap" id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="log-box"></div>
  <div id="results-header"></div>
  <div id="results-grid"></div>

</div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const PROXY2 = "https://corsproxy.io/?";

let foundPairs = [];

function log(msg, color) {
  const box = document.getElementById('log-box');
  box.style.display = 'block';
  const line = document.createElement('div');
  line.style.color = color || '#a6e3a1';
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function setProgress(pct) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function clearAll() {
  document.getElementById('urls-input').value = '';
  document.getElementById('names-input').value = '';
  document.getElementById('log-box').innerHTML = '';
  document.getElementById('log-box').style.display = 'none';
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('results-header').style.display = 'none';
  document.getElementById('dl-all-btn').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  setStatus('');
  foundPairs = [];
}

function sanitize(name) {
  return name.replace(/[\/\\:*?"<>|]/g, '').trim().replace(/\s+/g, '_');
}

function getExt(url, mimeType) {
  if (mimeType) {
    const m = mimeType.split(';')[0].split('/')[1];
    if (m && m !== 'octet-stream') return m.replace('jpeg','jpg');
  }
  const clean = url.split('?')[0];
  const m = clean.match(/\.(jpg|jpeg|png|gif|webp|svg|avif)$/i);
  return m ? m[1].toLowerCase() : 'jpg';
}

function scoreImage(img, baseUrl) {
  let src = img.getAttribute('src') || img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('data-original') || '';
  if (!src || src.startsWith('data:')) return null;

  const lower = src.toLowerCase();
  const skip = ['logo','icon','favicon','pixel','spacer','badge','avatar','sprite','blank','placeholder','loading','spinner','arrow','bullet','star','checkmark','1x1','tracking'];
  if (skip.some(s => lower.includes(s))) return null;

  try {
    if (src.startsWith('//')) src = 'https:' + src;
    else if (src.startsWith('/')) src = new URL(src, baseUrl).href;
    else if (!src.startsWith('http')) src = new URL(src, baseUrl).href;
  } catch(e) { return null; }

  const w = parseInt(img.getAttribute('width') || 0);
  const h = parseInt(img.getAttribute('height') || 0);
  const area = w * h;
  const isBody = !lower.includes('header') && !lower.includes('footer') && !lower.includes('thumb') && !lower.includes('tiny');
  const score = area > 0 ? area + (isBody ? 1000 : 0) : (src.length + (isBody ? 500 : 0));
  return { src, score };
}

function findBestImage(html, baseUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Try og:image first
  const og = doc.querySelector('meta[property="og:image"]');
  if (og && og.content && og.content.startsWith('http')) return og.content;

  // Try main content images
  const selectors = ['main img', 'article img', '.content img', '#content img', '.hero img', 'section img', 'body img'];
  let allImgs = [];
  for (const sel of selectors) {
    const imgs = Array.from(doc.querySelectorAll(sel));
    if (imgs.length) { allImgs = imgs; break; }
  }
  if (!allImgs.length) allImgs = Array.from(doc.querySelectorAll('img'));

  const scored = allImgs.map(img => scoreImage(img, baseUrl)).filter(Boolean);
  if (!scored.length) return null;
  scored.sort((a, b) => b.score - a.score);
  return scored[0].src;
}

async function fetchWithProxy(url) {
  // Try proxy 1
  try {
    const r = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
    if (r.ok) return await r.text();
  } catch(e) {}
  // Try proxy 2
  try {
    const r = await fetch(PROXY2 + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
    if (r.ok) return await r.text();
  } catch(e) {}
  throw new Error('Both proxies failed - site may block scraping');
}

async function downloadImgBlob(imgUrl, filename) {
  // Try direct fetch
  const tryFetch = async (url) => {
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const blob = await r.blob();
    const ext = getExt(imgUrl, blob.type);
    return { blob, ext };
  };

  let blob, ext;
  try { ({ blob, ext } = await tryFetch(imgUrl)); }
  catch(e) {
    try { ({ blob, ext } = await tryFetch(PROXY + encodeURIComponent(imgUrl))); }
    catch(e2) { throw new Error('Cannot download image'); }
  }

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename + '.' + ext;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 3000);
}

function addCard(name, imgUrl, error) {
  const grid = document.getElementById('results-grid');
  const card = document.createElement('div');
  card.className = 'img-card' + (error ? ' error' : '');

  if (error) {
    card.innerHTML = `<div class="img-name">${name}</div><div class="err-msg">${error}</div>`;
  } else {
    const safe = sanitize(name);
    card.innerHTML = `
      <img src="${imgUrl}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height%3D%22100%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23f3f4f6%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>No preview</text></svg>'" />
      <div class="img-name">${name}</div>
      <button class="dl-btn" onclick="singleDownload('${imgUrl.replace(/'/g,"\\'")}','${safe.replace(/'/g,"\\'")}',this)">⬇ Download</button>
    `;
  }
  grid.appendChild(card);
}

async function singleDownload(url, name, btn) {
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  try {
    await downloadImgBlob(url, name);
    if (btn) { btn.textContent = '✓ Done'; btn.style.background = '#16a34a'; }
  } catch(e) {
    if (btn) { btn.textContent = 'Failed'; btn.style.background = '#dc2626'; btn.disabled = false; }
    alert('Download failed: ' + e.message + '\n\nTry right-clicking the image and "Save image as..."');
  }
}

async function downloadAll() {
  const btn = document.getElementById('dl-all-btn');
  btn.disabled = true;
  btn.textContent = '⬇ Downloading...';
  for (let i = 0; i < foundPairs.length; i++) {
    setStatus(`Downloading ${i+1}/${foundPairs.length}...`);
    try { await downloadImgBlob(foundPairs[i].imgUrl, sanitize(foundPairs[i].name)); }
    catch(e) { log(`  Skip ${foundPairs[i].name}: ${e.message}`, '#f38ba8'); }
    await new Promise(r => setTimeout(r, 600));
  }
  setStatus('All downloads complete!');
  btn.textContent = '✓ Done';
  btn.disabled = false;
}

async function startProcess() {
  const urlsRaw = document.getElementById('urls-input').value.trim();
  const namesRaw = document.getElementById('names-input').value.trim();
  if (!urlsRaw || !namesRaw) { alert('Please paste both URLs and Names.'); return; }

  const urls = urlsRaw.split('\n').map(x => x.trim()).filter(Boolean);
  const names = namesRaw.split('\n').map(x => x.trim()).filter(Boolean);

  if (urls.length !== names.length) {
    alert(`Mismatch!\nURLs: ${urls.length}\nNames: ${names.length}\nPlease make sure each URL has a corresponding name.`);
    return;
  }

  // Reset
  document.getElementById('log-box').innerHTML = '';
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('dl-all-btn').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('start-btn').disabled = true;
  foundPairs = [];
  let successCount = 0;

  document.getElementById('results-header').style.display = 'block';
  document.getElementById('results-header').textContent = 'Results';

  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    const name = names[i];
    setStatus(`Processing ${i+1} of ${urls.length}...`);
    setProgress(Math.round(((i) / urls.length) * 100));
    log(`[${i+1}/${urls.length}] ${name}`);

    try {
      const html = await fetchWithProxy(url);
      const imgUrl = findBestImage(html, url);
      if (imgUrl) {
        log(`  ✓ Found image`, '#a6e3a1');
        addCard(name, imgUrl, null);
        foundPairs.push({ name, imgUrl });
        successCount++;
      } else {
        log(`  ✗ No image found`, '#f38ba8');
        addCard(name, null, 'No suitable image found');
      }
    } catch(e) {
      log(`  ✗ ${e.message}`, '#f38ba8');
      addCard(name, null, e.message);
    }

    await new Promise(r => setTimeout(r, 400));
  }

  setProgress(100);
  setStatus(`Done — ${successCount} of ${urls.length} images found`);
  document.getElementById('start-btn').disabled = false;
  document.getElementById('results-header').textContent = `Results — ${successCount}/${urls.length} found`;

  if (foundPairs.length > 0) {
    const btn = document.getElementById('dl-all-btn');
    btn.style.display = 'inline-block';
    btn.textContent = `⬇ Download All ${foundPairs.length} Images`;
  }
}
</script>
</body>
</html>
